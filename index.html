<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hangman Game</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
<div id="app">

<!-- =========================================================
WELCOME SCREEN
========================================================= -->
<section id="welcome-screen" class="screen active">

  <div class="welcome-wrapper">

    <header class="welcome-header">
      <div class="welcome-logo">🪢</div>
      <h1 class="game-title">Hangman Game</h1>
    </header>

    <div class="welcome-card">

      <div id="player-input-section">
        <h2 class="card-title">Enter Your Name</h2>

        <input id="player-name-input" class="form-input" placeholder="Type your name..." />
        <span id="player-name-error" class="form-error hidden">Invalid name</span>

        <button id="confirm-player-btn" class="btn btn-primary btn-lg">OK</button>
      </div>

      <div id="player-confirmed-section" class="hidden">

        <h2 class="form-title">Playing as</h2>
        <p id="confirmed-player-name"></p>

        <div>
          <p>Wins: <span id="stat-wins">0</span></p>
          <p>Losses: <span id="stat-losses">0</span></p>
          <p>Matches: <span id="stat-matches">0</span></p>
          <p>Score: <span id="stat-score">0</span></p>
        </div>

        <button id="start-game-btn" class="btn btn-primary btn-lg">Start Game</button>
        <button id="change-player-btn" class="btn btn-ghost">Change</button>

      </div>

    </div>

    <div class="welcome-nav">
      <button id="view-ranking-btn" class="btn btn-outline">🏆 Ranking</button>
      <button id="view-history-btn" class="btn btn-outline">📋 History</button>
    </div>

  </div>
</section>


<!-- =========================================================
GAME SCREEN
========================================================= -->
<section id="game-screen" class="screen hidden">

<header class="game-topbar">

  <button id="back-to-welcome-btn" class="btn btn-ghost btn-sm">←</button>

  <div>
    <span>Player</span>
    <span id="current-player-name">---</span>
  </div>

  <div class="topbar-stats">
    <span>Score <b id="player-score">0</b></span>
    <span>Wins <b id="player-wins">0</b></span>
    <span>Losses <b id="player-losses">0</b></span>
    <span>Matches <b id="player-matches">0</b></span>
  </div>

</header>


<main class="game-main">

<!-- LEFT -->
<div class="game-panel">

  <div id="attempts-remaining">6</div>

  <div id="wrong-letters-container"></div>

</div>

<!-- RIGHT -->
<div class="game-panel">

  <div id="word-category">---</div>

  <div id="word-display"></div>

  <div id="status-area"></div>

  <!-- VIRTUAL KEYBOARD (CLICK ONLY) -->
  <div id="virtual-keyboard">

    <!-- JS will still work with your system -->
    <button class="key-btn" data-letter="A">A</button>
    <button class="key-btn" data-letter="B">B</button>
    <button class="key-btn" data-letter="C">C</button>
    <button class="key-btn" data-letter="D">D</button>
    <button class="key-btn" data-letter="E">E</button>
    <button class="key-btn" data-letter="F">F</button>
    <button class="key-btn" data-letter="G">G</button>
    <button class="key-btn" data-letter="H">H</button>
    <button class="key-btn" data-letter="I">I</button>
    <button class="key-btn" data-letter="J">J</button>
    <button class="key-btn" data-letter="K">K</button>
    <button class="key-btn" data-letter="L">L</button>
    <button class="key-btn" data-letter="M">M</button>
    <button class="key-btn" data-letter="N">N</button>
    <button class="key-btn" data-letter="O">O</button>
    <button class="key-btn" data-letter="P">P</button>
    <button class="key-btn" data-letter="Q">Q</button>
    <button class="key-btn" data-letter="R">R</button>
    <button class="key-btn" data-letter="S">S</button>
    <button class="key-btn" data-letter="T">T</button>
    <button class="key-btn" data-letter="U">U</button>
    <button class="key-btn" data-letter="V">V</button>
    <button class="key-btn" data-letter="W">W</button>
    <button class="key-btn" data-letter="X">X</button>
    <button class="key-btn" data-letter="Y">Y</button>
    <button class="key-btn" data-letter="Z">Z</button>

  </div>

</div>

</main>

</section>


<!-- =========================================================
RANKING
========================================================= -->
<section id="ranking-screen" class="screen hidden">

<header class="inner-screen-header">

  <button id="back-from-ranking-btn">←</button>
  <h2>🏆 Ranking</h2>
  <button id="clear-ranking-btn">Clear</button>

</header>

<div class="inner-screen-body">

  <table>
    <tbody id="ranking-list"></tbody>
  </table>

  <div id="ranking-empty" class="hidden">No players yet</div>

</div>
</section>


<!-- =========================================================
HISTORY
========================================================= -->
<section id="history-screen" class="screen hidden">

<header class="inner-screen-header">

  <button id="back-from-history-btn">←</button>
  <h2>📋 History</h2>
  <button id="clear-history-btn">Clear</button>

</header>

<div class="inner-screen-body">

  <input id="history-filter-input" placeholder="Filter..." />
  <select id="history-filter-result">
    <option value="all">All</option>
    <option value="win">Win</option>
    <option value="lose">Lose</option>
  </select>

  <div id="history-list"></div>

  <div id="history-empty" class="hidden">No matches yet</div>

</div>

</section>

</div>

<!-- SCRIPTS (ORDEM IMPORTA) -->
<script src="storage.js"></script>
<script src="utils.js"></script>
<script src="players.js"></script>
<script src="ranking.js"></script>
<script src="api.js"></script>
<script src="game.js"></script>
<script src="ui.js"></script>
<script src="update.js"></script>
<script src="main.js"></script>

</body>
</html>
